<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="card">
    <div class="header">
      <span class="title">⚽ <span data-i18n="appName">OSM Reward Handler</span></span>
      <div class="header-right">
        <div class="lang-switch">
          <button id="lang-tr" class="lang-btn" title="Türkçe">
            <img src="flags/tr.svg" alt="TR">
          </button>
          <button id="lang-en" class="lang-btn" title="English">
            <img src="flags/gb.svg" alt="EN">
          </button>
        </div>
        <span class="version">v3.0.0</span>
      </div>
    </div>
    <div class="section">
      <div class="label" data-i18n="labelStatus">Durum</div>
      <div id="status" class="status" data-i18n="statusChecking">Kontrol ediliyor...</div>
    </div>
    <div class="section">
      <div class="label" data-i18n="labelCountdown">Geri Sayım</div>
      <div id="timer" class="timer">--:--:--</div>
    </div>
    <div class="section">
      <div class="label" data-i18n="labelTotalWatched">Toplam İzlenen</div>
      <div id="total-ads" class="total-ads">0</div>
    </div>
  </div>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
